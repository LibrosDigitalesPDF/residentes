<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residencial Francia - Archivo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <img src="logo.png" alt="Logo Residencial Francia" class="logo" onerror="this.src='https://via.placeholder.com/100x50?text=LOGO'">
        <div class="header-text">
            <h1>Residencial Francia</h1>
            <p>Archivo General de Residentes</p>
        </div>
    </header>

    <main class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Buscar residente por nombre, DNI, Nº Trámite o Nº de Socio...">
        </div>

        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Cargando archivo y vinculando datos...</p>
        </div>

        <div id="residentsGrid" class="grid" style="display: none;"></div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyaBeXyPSGA3jZ4KzJs7fS15UVSnKADTtziiLeDLVsUl5lV7XEsHE_EupRFE0OqsmIR0g/exec"; 
        const DEFAULT_IMAGE = "logo.jpg"; // Imagen genérica
    </script>
    <script src="app.js"></script>
</body>
</html>
