<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Residente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="header-text">
            <h1>Residencial Francia</h1>
            <p>Ficha Individual Interactiva</p>
        </div>
    </header>

    <main class="container">
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Sincronizando expedientes...</p>
        </div>

        <div id="content" style="display: none;">
            
            <!-- HEADER DEL PERFIL Y BOTONES -->
            <div class="profile-header" id="profileHeader">
                <div class="profile-info-group">
                    <div class="image-upload-container">
                        <img id="profileImage" src="" alt="Foto">
                        <label for="fileInput" class="upload-btn" title="Cambiar Foto"><i class="fas fa-camera"></i></label>
                        <input type="file" id="fileInput" accept="image/*">
                    </div>
                    <div class="profile-titles">
                        <h2 id="displayName">Cargando...</h2>
                        <p>Nº de Socio: <span id="displaySocio">-</span></p>
                        <span id="imageStatus" style="font-size: 0.85rem; color: var(--secondary-color);"></span>
                    </div>
                </div>
                <div class="profile-actions">
                    <button id="btnEdit" class="btn btn-primary" onclick="toggleEditMode()"><i class="fas fa-pen"></i> Editar Perfil</button>
                    <button id="btnSave" class="btn btn-success" style="display: none;" onclick="saveAllData()"><i class="fas fa-save"></i> Guardar Cambios</button>
                </div>
            </div>

            <!-- SECCIÓN 1: Datos Personales y Médicos (Comunes) -->
            <div class="section">
                <h3>1. Datos Personales y Médicos Generales</h3>
                <div class="form-grid" id="section1">
                    <!-- Inyectado por JS -->
                </div>
            </div>

            <!-- SECCIÓN 2: Obras Sociales (Lista) -->
            <div class="section">
                <h3>2. Información de Obras Sociales</h3>
                <div id="section2">
                    <!-- Inyectado por JS -->
                </div>
            </div>

            <!-- SECCIÓN 3: Administrativo -->
            <div class="section">
                <h3>3. Datos Administrativos</h3>
                <div class="form-grid" id="section3">
                    <!-- Inyectado por JS -->
                </div>
            </div>

            <!-- SECCIÓN 4: Contactos Familiares (Solo visualización por ahora) -->
            <div class="section">
                <h3>4. Contactos de Emergencia</h3>
                <table class="data-table" id="contactTable">
                    <thead><tr><th>Familiar Responsable</th><th>Teléfono</th><th>DNI</th><th>Domicilio</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyaBeXyPSGA3jZ4KzJs7fS15UVSnKADTtziiLeDLVsUl5lV7XEsHE_EupRFE0OqsmIR0g/exec"; 
        const DEFAULT_IMAGE = "logo.jpg";
    </script>
    <script src="resident.js"></script>
</body>
</html>
