<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Residente - Residencial Francia</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <header class="main-header">
        <div class="header-left">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</a>
        </div>
        <div class="header-right" style="display: flex; align-items: center; gap: 15px;">
            <!-- Badge para Archivados -->
            <span id="statusBadge" style="display: none; font-weight: bold; font-size: 0.85rem;"></span>
            <h1>Ficha de Residente</h1>
        </div>
    </header>

    <main class="profile-container">
        <!-- Notificaciones -->
        <div id="toast" class="toast"></div>

        <div id="loader" class="loader-container hidden">
            <div class="spinner"></div>
            <p>Procesando datos...</p>
        </div>

        <div id="residentForm" class="profile-form readonly-mode">

            <!-- BOTONES DE GUARDADO Y CANCELADO -->
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px; padding: 0 20px;">
                <button id="btnCancel" class="btn btn-danger hidden"><i class="fa-solid fa-xmark"></i> Cancelar</button>
                <button id="btnSave" class="btn btn-success hidden"><i class="fa-solid fa-save"></i> Guardar Cambios</button>
            </div>
            
            <!-- SECCIÓN 1: Info Base -->
            <section class="profile-section section-1">
                <div class="photo-column" style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
                    <div class="photo-wrapper" style="margin-bottom: 5px;">
                        <img id="profileImage" src="" alt="Foto Residente" onerror="this.src='https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png'">
                    </div>
                    
                    <!-- Botón Cargar Imagen (Oculto por defecto, se muestra al editar) -->
                    <label id="btnUploadContainer" for="imageUpload" class="btn btn-outline hidden" style="width: 100%; justify-content: center; cursor: pointer;">
                        <i class="fa-solid fa-upload"></i> Cargar Imagen
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">

                    <!-- Botón Editar Perfil reubicado aquí -->
                    <button id="btnEdit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                        <i class="fa-solid fa-pen"></i> Editar Perfil
                    </button>
                </div>
                
                <div class="info-column">
                    <div class="form-row large-text">
                        <div class="form-group flex-2">
                            <label>Nombre Completo</label>
                            <input type="text" id="nombre" name="nombre" required readonly>
                        </div>
                        <div class="form-group flex-1">
                            <label>Número de Socio</label>
                            <input type="text" id="numeroSocio" name="numeroSocio" readonly>
                        </div>
                    </div>
                    <!-- Todo en una sola línea -->
                    <div class="form-row">
                        <div class="form-group flex-1"><label>Fecha Nac.</label><input type="date" id="fechaNacimiento" name="fechaNacimiento" readonly></div>
                        <div class="form-group" style="flex: 0.5;"><label>Edad</label><input type="number" id="edad" name="edad" readonly></div>
                        <div class="form-group flex-1"><label>DNI</label><input type="text" id="dni" name="dni" readonly></div>
                        <div class="form-group flex-1"><label>CUIL</label><input type="text" id="cuil" name="cuil" readonly></div>
                        <div class="form-group flex-1"><label>N° Trámite</label><input type="text" id="numeroTramite" name="numeroTramite" readonly></div>
                    </div>
                    <!-- Segunda línea debajo -->
                    <div class="form-row">
                        <div class="form-group flex-1"><label>Lugar de Internación</label><input type="text" id="lugarInternacion" name="lugarInternacion" readonly></div>
                        <div class="form-group flex-2"><label>Alergias</label><input type="text" id="alergias" name="alergias" readonly></div>
                    </div>
            </section>

            <!-- SECCIÓN 2: Médica -->
            <section class="profile-section section-2">
                <h3><i class="fa-solid fa-notes-medical"></i> Información Médica y Cobertura</h3>
                <div class="form-row">
                    <div class="form-group flex-2"><label>Médico de Cabecera</label><input type="text" id="medicoCabecera" name="medicoCabecera" readonly></div>
                </div>
                
                <div id="obrasSocialesContainer">
                    <!-- Se inyectan filas dinámicamente -->
                </div>
                
                <!-- BOTÓN AÑADIR OBRA SOCIAL ALINEADO A LA DERECHA -->
                <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                    <button type="button" id="btnAddOs" class="btn btn-outline hidden"><i class="fa-solid fa-plus"></i> Añadir Obra Social</button>
                </div>
            </section>

            <!-- SECCIÓN 3: Contacto Responsable (NUEVO SISTEMA MÚLTIPLE) -->
            <section class="profile-section section-4">
                <h3><i class="fa-solid fa-users"></i> Contacto Responsable</h3>
                
                <div id="responsablesContainer">
                    <!-- Se inyectan bloques de responsables dinámicamente desde resident.js -->
                </div>
                
                <!-- BOTÓN AÑADIR RESPONSABLE ALINEADO A LA DERECHA -->
                <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                    <button type="button" id="btnAddResponsable" class="btn btn-outline hidden"><i class="fa-solid fa-plus"></i> Añadir Responsable</button>
                </div>
            </section>

            <!-- SECCIÓN 4: Administrativa -->
            <section class="profile-section section-3">
                <h3><i class="fa-solid fa-folder-open"></i> Datos Administrativos</h3>
                <div class="form-row">
                    <div class="form-group flex-1"><label>Fecha de Ingreso</label><input type="date" id="fechaIngreso" name="fechaIngreso" readonly></div>
                    <div class="form-group flex-1"><label>Nacionalidad</label><input type="text" id="nacionalidad" name="nacionalidad" readonly></div>
                    <div class="form-group flex-2"><label>Domicilio</label><input type="text" id="domicilio" name="domicilio" readonly></div>
                    <!-- CONTENEDOR DE FECHA DE SALIDA (Para Archivados) -->
                    <div class="form-group hidden flex-1" id="divFechaSalida"><label style="color: var(--danger);">Fecha de Salida</label><input type="date" id="fechaSalida" name="fechaSalida" class="warning-text" readonly></div>
                </div>
            </section>

            <!-- SECCIÓN 5: Archivos en Drive (NUEVO) -->
            <section class="profile-section section-5">
                <h3><i class="fa-brands fa-google-drive" style="color: #0F9D58;"></i> Archivos en la Nube (Google Drive)</h3>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>Enlace o ID de la Carpeta del Residente</label>
                        <input type="text" id="carpetaDrive" name="carpetaDrive" readonly placeholder="Pegar ID o enlace de la carpeta aquí...">
                    </div>
                    <div class="form-group flex-1">
                        <label>Enlace o ID de la Foto de Perfil manual</label>
                        <input type="text" id="imagenDrive" name="imagenDrive" readonly placeholder="Pegar ID o enlace de la foto aquí...">
                    </div>
                </div>
            </section>
            
        </div>
    </main>

    <script src="js/resident.js"></script>
</body>
</html>
