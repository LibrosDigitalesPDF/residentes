<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residencial Francia - Archivo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <!-- Reemplaza src con el logo de tu empresa -->
        <img src="https://via.placeholder.com/100x50?text=LOGO" alt="Logo Residencial Francia" class="logo">
        <div class="header-text">
            <h1>Residencial Francia</h1>
            <p>Archivo - Residentes</p>
        </div>
    </header>

    <main class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Buscar residente por nombre, DNI o número...">
        </div>

        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Cargando archivo de residentes...</p>
        </div>

        <div id="residentsGrid" class="grid" style="display: none;">
            <!-- Las tarjetas se inyectarán aquí vía JS -->
        </div>
    </main>

    <!-- Pega AQUÍ tu URL de la Web App de Apps Script -->
    <script>
        const API_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; 
    </script>
    <script src="app.js"></script>

</html>
